openapi: 3.1.0
info:
  title: Quantum Orchard Registry API
  version: 9.4.2
  summary: Public interface for neon orchard coordination.
  description: |
    This specification describes a fictional platform that manages
    orchard nodes, harvest cycles, relay messages, and access credentials.
servers:
  - url: https://api.quantum-orchard.example/v3
    description: Primary cluster
  - url: https://staging.quantum-orchard.example/v3
    description: Sandbox cluster
tags:
  - name: NodeLedger
    description: Operations related to orchard nodes.
  - name: CycleMatrix
    description: Harvest cycle orchestration.
  - name: RelayChannel
    description: Event relay publishing and inspection.
paths:
  /foo/bar/baz:
    get:
      operationId: fooBarBaz
      parameters:
      - in: query
        name: a
        required: true
        type: string
      - collectionFormat: multi
        in: query
        items:
          type: string
        name: excludeRt
        type: array
      - in: query
        name: login
        type: string
      produces:
        - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      responses:
        '200':
          description: A successful response.
          schema:
            "$ref": "#/components/schemas/Keoddd"
  /node-ledger:
    get:
      tags: [NodeLedger]
      operationId: browseNodeLedger
      summary: List orchard nodes
      parameters:
        - $ref: '#/components/parameters/OffsetMarker'
        - $ref: '#/components/parameters/BatchSize'
      responses:
        '200':
          description: A paginated collection of nodes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodePageEnvelope'
        '401':
          $ref: '#/components/responses/AccessDenied'
    post:
      tags: [NodeLedger]
      operationId: registerNodeLedgerEntry
      summary: Register a new node
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodeDraftPayload'
      responses:
        '201':
          description: Created node record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeRecord'
        '409':
          $ref: '#/components/responses/RecordConflict'
  /node-ledger/{ledgerNodeId}:
    parameters:
      - $ref: '#/components/parameters/LedgerNodeId'
    get:
      tags: [NodeLedger]
      operationId: inspectNodeLedgerEntry
      summary: Retrieve single node details
      responses:
        '200':
          description: Node details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeRecord'
        '404':
          $ref: '#/components/responses/EntryMissing'
    patch:
      tags: [NodeLedger]
      operationId: tuneNodeLedgerEntry
      summary: Update node profile fields
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: '#/components/schemas/NodePatchPayload'
      responses:
        '200':
          description: Updated node details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeRecord'
  /golden-apples/{id}:
    get:
      tags:
        - GoldenApple
      x-ogen-operation-group: 'GoldenApple'
      operationId: getGoldenApple
      security:
        - accessCookieAuth: [ ]
      summary: Get a specific golden apple
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Golden apple
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoldenApple'
        'default':
          description: Unable to retrieve
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /cycle-matrix:
    get:
      tags: [CycleMatrix]
      operationId: listCycleMatrixRows
      summary: List harvest cycles
      responses:
        '200':
          description: Collection of cycle snapshots.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CycleSnapshot'
    post:
      tags: [CycleMatrix]
      operationId: createCycleMatrixRow
      summary: Create new harvest cycle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CycleDraftPayload'
      responses:
        '201':
          description: Created cycle snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CycleSnapshot'
  # Endpoints for response format inference tests (mimeToFormat coverage)
  /reports/plain-text:
    get:
      operationId: getTextReport
      summary: Plain text report
      responses:
        '200':
          description: Text report
          content:
            text/plain:
              schema:
                type: string
  /reports/multipart:
    get:
      operationId: getMultipartReport
      summary: Multipart report
      responses:
        '200':
          description: Multipart form data
          content:
            multipart/form-data:
              schema:
                type: object
  /reports/binary:
    get:
      operationId: getBinaryReport
      summary: Binary file (octet-stream)
      security:
        - TestBearer: []
      externalDocs:
        url: https://api.example.com/docs/binary-report
        description: Binary report API reference
      responses:
        '200':
          description: Binary content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
  /reports/image:
    get:
      operationId: getImageReport
      summary: Image response
      responses:
        '200':
          description: PNG image
          content:
            image/png:
              schema:
                type: string
                format: binary
  /reports/audio:
    get:
      operationId: getAudioReport
      summary: Audio response
      responses:
        '200':
          description: Audio file
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary
  /reports/video:
    get:
      operationId: getVideoReport
      summary: Video response
      responses:
        '200':
          description: Video file
          content:
            video/mp4:
              schema:
                type: string
                format: binary
  /reports/font:
    get:
      operationId: getFontReport
      summary: Font file response
      responses:
        '200':
          description: Web font
          content:
            font/woff2:
              schema:
                type: string
                format: binary
  /reports/json-variant:
    get:
      operationId: getJsonVariantReport
      summary: JSON variant (+json suffix)
      responses:
        '200':
          description: Vendor JSON
          content:
            application/vnd.api+json:
              schema:
                type: object
  /reports/model:
    get:
      operationId: getModelReport
      summary: 3D model (model/*)
      responses:
        '200':
          description: GLTF binary model
          content:
            model/gltf-binary:
              schema:
                type: string
                format: binary
  /reports/message:
    get:
      operationId: getMessageReport
      summary: Message (message/*)
      responses:
        '200':
          description: RFC822 message
          content:
            message/rfc822:
              schema:
                type: string
                format: binary
  # Request body contentType inference (inferRequestBodyContentTypeFromRaw)
  /reports/form-encoded:
    post:
      operationId: submitFormEncodedReport
      summary: Submit form-urlencoded payload
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                field:
                  type: string
      responses:
        '200':
          description: Accepted
          content:
            application/json:
              schema:
                type: object
  /reports/upload:
    post:
      operationId: submitMultipartReport
      summary: Upload multipart form data
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Uploaded
          content:
            application/json:
              schema:
                type: object
  /reports/plain-body:
    post:
      operationId: submitPlainTextReport
      summary: Submit plain text body
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
      responses:
        '200':
          description: Accepted
          content:
            text/plain:
              schema:
                type: string
  /reports/binary-upload:
    post:
      operationId: submitBinaryUploadReport
      summary: Upload binary (octet-stream)
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Accepted
          content:
            application/json:
              schema:
                type: object
  /reports/multi-content:
    post:
      operationId: submitMultiContentReport
      summary: Accepts both JSON and form (preferred order json first)
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Accepted
          content:
            application/json:
              schema:
                type: object
  /reports/merge-patch:
    patch:
      operationId: applyMergePatchReport
      summary: Merge patch (+json → application/json)
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              type: object
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
  /relay-channel/publish:
    post:
      tags: [RelayChannel]
      operationId: publishRelaySignal
      summary: Publish relay signal packet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RelaySignalPacket'
      responses:
        '202':
          description: Packet accepted for distribution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DispatchReceipt'
        '422':
          $ref: '#/components/responses/ValidationTrap'
components:
  securitySchemes:
    TestBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    OffsetMarker:
      name: offsetMarker
      in: query
      required: false
      schema:
        type: string
        pattern: '^mk_[A-Za-z0-9]{8,32}$'
      description: Cursor marker for forward pagination.
    BatchSize:
      name: batchSize
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 40
      description: Maximum number of rows returned.
    LedgerNodeId:
      name: ledgerNodeId
      in: path
      required: true
      schema:
        type: string
        pattern: '^nd_[A-Za-z0-9]{12}$'
      description: Stable node identifier.
  responses:
    AccessDenied:
      description: Access token is absent or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemArtifact'
    RecordConflict:
      description: Record conflicts with existing data.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemArtifact'
    EntryMissing:
      description: Requested record is not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemArtifact'
    ValidationTrap:
      description: Input payload failed semantic checks.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemArtifact'
  schemas:
    NodePageEnvelope:
      type: object
      required: [rows, pageInfo]
      properties:
        rows:
          type: array
          items:
            $ref: '#/components/schemas/NodeRecord'
        pageInfo:
          $ref: '#/components/schemas/PageInfoToken'
    NodeRecord:
      type: object
      required: [ledgerNodeId, displayLabel, shardClass, lifecycleState, telemetry]
      properties:
        ledgerNodeId:
          type: string
          example: nd_7fR4Qp2Lm8Za
        displayLabel:
          type: string
          minLength: 3
          maxLength: 90
          example: Amber-Vector-17
        shardClass:
          type: string
          enum: [copper, cobalt, graphite, iridium]
        lifecycleState:
          type: string
          enum: [queued, active, frozen, retired]
        telemetry:
          $ref: '#/components/schemas/NodeTelemetryBlock'
    NodeTelemetryBlock:
      type: object
      required: [heartbeatEpochMs, signalGrade, anomalyScore]
      properties:
        heartbeatEpochMs:
          type: integer
          format: int64
          minimum: 0
        signalGrade:
          type: number
          format: float
          minimum: 0
          maximum: 100
        anomalyScore:
          type: number
          format: float
          minimum: 0
          maximum: 1
    NodeDraftPayload:
      type: object
      required: [displayLabel, shardClass]
      properties:
        displayLabel:
          type: string
        shardClass:
          type: string
          enum: [copper, cobalt, graphite, iridium]
    NodePatchPayload:
      type: object
      additionalProperties: false
      properties:
        displayLabel:
          type: string
        lifecycleState:
          type: string
          enum: [queued, active, frozen, retired]
    CycleDraftPayload:
      type: object
      required: [cycleAlias, targetNodeIds, schedule]
      properties:
        cycleAlias:
          type: string
          example: cycle-nebula-prime
        targetNodeIds:
          type: array
          minItems: 1
          items:
            type: string
        schedule:
          $ref: '#/components/schemas/ScheduleBlock'
    CycleSnapshot:
      type: object
      required: [cycleId, cycleAlias, runState, schedule]
      properties:
        cycleId:
          type: string
          example: cy_hL84mQ1zNfR5
        cycleAlias:
          type: string
        runState:
          type: string
          enum: [draft, armed, running, suspended, archived]
        schedule:
          $ref: '#/components/schemas/ScheduleBlock'
    ScheduleBlock:
      type: object
      required: [timezoneCode, cronMask]
      properties:
        timezoneCode:
          type: string
          example: UTC
        cronMask:
          type: string
          example: '15 */2 * * *'
    RelaySignalPacket:
      type: object
      required: [channelCode, eventVerb, payload]
      properties:
        channelCode:
          type: string
          enum: [orchard.node, orchard.cycle, orchard.audit]
        eventVerb:
          type: string
          enum: [spawned, tuned, halted, resumed, removed]
        payload:
          type: object
          additionalProperties: true
    DispatchReceipt:
      type: object
      required: [receiptId, acceptedEpochMs]
      properties:
        receiptId:
          type: string
          example: rc_B3z9Wq5Lt2Pm
        acceptedEpochMs:
          type: integer
          format: int64
    PageInfoToken:
      type: object
      required: [hasNext, nextMarker]
      properties:
        hasNext:
          type: boolean
        nextMarker:
          type: string
          nullable: true
    Keoddd:
      type: object
    ProblemArtifact:
      type: object
      required: [problemCode, problemTitle, statusCode]
      properties:
        problemCode:
          type: string
          example: relay.validation.failed
        problemTitle:
          type: string
          example: Validation failed for packet body.
        statusCode:
          type: integer
          example: 422
        problemDetail:
          type: string
          nullable: true
    Core:
      type: object
      properties:
        title:
          type: string
        id:
          type: string
          format: uuid
      required:
        - title
        - id
    Ripeness:
      type: string
      enum:
        - active
        - draft
        - archived
    GardenerName:
      type: object
      properties:
        first_name:
          type: string
          minLength: 1
          maxLength: 100
        last_name:
          type: string
          minLength: 1
          maxLength: 100
        father_name:
          type: string
          maxLength: 100
    SeedScore:
      type: number
      nullable: true
      minimum: 0
      maximum: 5
    JuiceRatio:
      type: number
      format: float
      nullable: true
      minimum: 0
      maximum: 1
    HarvestGrade:
      type: number
      format: float
      nullable: true
      minimum: 0
      maximum: 100
    BasketGrade:
      type: object
      properties:
        interview:
          $ref: '#/components/schemas/HarvestGrade'
        trial_review:
          $ref: '#/components/schemas/HarvestGrade'
        tech_review:
          $ref: '#/components/schemas/HarvestGrade'
    TreeRequirements:
      type: object
      properties:
        id:
          type: string
          format: uuid
        grade_id:
          type: string
          format: uuid
        competency:
          type: object
          properties:
            id:
              type: string
              format: uuid
            title:
              type: string
              minLength: 1
          required:
            - id
            - title
        description:
          nullable: true
          type: string
          maxLength: 500
        marks:
          type: object
          properties:
            tech_review:
              $ref: '#/components/schemas/SeedScore'
            interview:
              $ref: '#/components/schemas/SeedScore'
            trial_review:
              $ref: '#/components/schemas/SeedScore'
      required:
        - id
        - grade_id
        - competency
        - marks
    BranchMarks:
      type: object
      properties:
        interview:
          $ref: '#/components/schemas/JuiceRatio'
        trial_review:
          $ref: '#/components/schemas/JuiceRatio'
        tech_review:
          $ref: '#/components/schemas/JuiceRatio'
    OrchardRequirements:
      type: object
      properties:
        id:
          type: string
          format: uuid
        group:
          type: object
          properties:
            id:
              type: string
              format: uuid
            title:
              type: string
              minLength: 1
          required:
            - id
            - title
        requirements:
          type: array
          items:
            $ref: '#/components/schemas/TreeRequirements'
        marks:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/BranchMarks'
    Apple:
      type: object
      properties:
        id:
          type: string
          format: uuid
        role:
          $ref: '#/components/schemas/Core'
        updated_at:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/Ripeness'
        version: 
          type: integer
        editor:
          $ref: '#/components/schemas/GardenerName'
      required:
        - id
        - role
        - updated_at
        - status
        - version
    GoldenApple:
      allOf:
        - $ref: '#/components/schemas/Apple'
        - type: object
          properties:
            marks:
              type: object
              additionalProperties:
                $ref: '#/components/schemas/BasketGrade'
            groups:
              type: array
              items:
                $ref: '#/components/schemas/OrchardRequirements'
security:
  - TestBearer: []
